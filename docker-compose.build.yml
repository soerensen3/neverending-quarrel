services:
  cache-builder:
    build:
      context: .
      dockerfile: Dockerfile.cache
      args:
        WHISPER_MODEL: ${WHISPER_MODEL:-base}
        OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b-instruct-q4_K_M}
        OLLAMA_MODELS: ${OLLAMA_MODELS:-qwen2.5-coder:7b-instruct-q4_K_M,qwen2.5-coder:3b-instruct-q4_K_M,qwen2.5-coder:1.5b-instruct-q4_K_M}
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b-instruct-q4_K_M}
      OLLAMA_MODELS: ${OLLAMA_MODELS:-qwen2.5-coder:7b-instruct-q4_K_M,qwen2.5-coder:3b-instruct-q4_K_M,qwen2.5-coder:1.5b-instruct-q4_K_M}
    volumes:
      - ./cache/whisper:/cache/whisper:Z,U
      - ./cache/kokoro:/cache/kokoro:Z,U
      - ${OLLAMA_MODELS_DIR:-./models/ollama}:/cache/ollama:Z,U
    command: ["/usr/local/bin/prefetch-models.sh"]

  ollama-cache-builder:
    image: ollama/ollama
    entrypoint: ["/bin/sh", "-lc"]
    environment:
      OLLAMA_MODELS: ${OLLAMA_MODELS:-qwen2.5-coder:7b-instruct-q4_K_M,qwen2.5-coder:3b-instruct-q4_K_M,qwen2.5-coder:1.5b-instruct-q4_K_M}
    volumes:
      - ${OLLAMA_MODELS_DIR:-./models/ollama}:/root/.ollama:Z,U
    command:
      - |
        set -eu
        ollama serve >/tmp/ollama.log 2>&1 &
        for i in $(seq 1 60); do
          ollama list >/dev/null 2>&1 && break
          sleep 1
        done
        for m in $(echo "$$OLLAMA_MODELS" | tr ',' ' '); do
          echo "Pulling $$m"
          ollama pull "$$m"
        done
        echo "Ollama models are ready in ${OLLAMA_MODELS_DIR:-./models/ollama}"
