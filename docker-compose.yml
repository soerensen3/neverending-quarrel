services:
  redis:
    image: redis:8.6.0
    restart: unless-stopped
    networks:
      - openclaw_net

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    environment:
      OLLAMA_VULKAN: ${OLLAMA_VULKAN:-1}
    volumes:
      - ${OLLAMA_MODELS_DIR:-./models/ollama}:/root/.ollama:Z,U
    devices:
      - /dev/dri:/dev/dri
    networks:
      - openclaw_net

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    restart: unless-stopped
    environment:
      ASR_MODEL: ${WHISPER_MODEL:-base}
      ASR_ENGINE: openai_whisper
    volumes:
      - ./cache/whisper:/root/.cache:Z
    ports:
      - "127.0.0.1:9000:9000"
    networks:
      - openclaw_net

  piper:
    image: ghcr.io/arunk140/serve-piper-tts:latest
    restart: unless-stopped
    volumes:
      - ./models/piper:/go/src/app/models:Z
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - openclaw_net

  openclaw:
    image: alpine/openclaw
    user: "0:0"
    restart: unless-stopped
    depends_on:
      - redis
      - ollama
      - piper
    environment:
      MACHINE_ID: ${MACHINE_ID}
      REDIS_HOST: redis
      OPENCLAW_CONFIG: /root/.openclaw/openclaw.json
    volumes:
      - ./skills:/app/skills:Z
      - ./config/openclaw.server.json:/root/.openclaw/openclaw.json:ro,Z
      - ./soul/SOUL.md:/app/soul/SOUL.md:ro,Z
    ports:
      - "18789:18789"
    networks:
      - openclaw_net

  stt-bridge:
    image: redis:alpine
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      MACHINE_ID: ${MACHINE_ID}
      STT_INPUT_LIST: ${STT_INPUT_LIST:-stt:transcripts}
      COOLDOWN_MS: ${COOLDOWN_MS:-1200}
      ECHO_WINDOW_MS: ${ECHO_WINDOW_MS:-4000}
      MIN_TEXT_LEN: ${MIN_TEXT_LEN:-3}
      DEBUG: ${STT_BRIDGE_DEBUG:-0}
    volumes:
      - ./scripts:/app/scripts:ro,Z
    command: ["sh", "/app/scripts/stt-redis-bridge.sh"]
    networks:
      - openclaw_net

  turn-driver:
    build:
      context: .
      dockerfile: Dockerfile.turn-driver
    userns_mode: host
    group_add:
      - "63"
    restart: unless-stopped
    depends_on:
      - redis
      - ollama
    environment:
      MACHINE_ID: ${MACHINE_ID}
      REDIS_HOST: redis
      OLLAMA_HOST: ${OLLAMA_HOST:-ollama}
      OLLAMA_PORT: ${OLLAMA_PORT:-11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b-instruct-q4_K_M}
      OLLAMA_SYSTEM_PROMPT: '${OLLAMA_SYSTEM_PROMPT:-You are a local voice assistant. Always answer in the same language as the latest user message. Return ONLY compact JSON: {"tool":"talk","text":"<what to say>"} and no markdown.}'
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-160}
      OLLAMA_HISTORY_ITEMS: ${OLLAMA_HISTORY_ITEMS:-24}
      TALK_MODE: ${TALK_MODE:-always}
      TTS_ENDPOINT: ${TTS_ENDPOINT:-http://piper:8080/api/tts}
      TTS_VOICE: ${TTS_VOICE:-de-thorsten-low.onnx}
      TTS_VOICE_DE: ${TTS_VOICE_DE:-de-thorsten-low.onnx}
      TTS_VOICE_EN: ${TTS_VOICE_EN:-en-us-lessac-medium.onnx}
      TTS_FORMAT: ${TTS_FORMAT:-wav}
      OPENCLAW_TIMEOUT_SECS: ${OPENCLAW_TIMEOUT_SECS:-90}
      COOLDOWN_MS: ${COOLDOWN_MS:-1200}
      DEBUG: ${TURN_DRIVER_DEBUG:-1}
    volumes:
      - ./skills:/app/skills:ro,Z
      - ./scripts/openclaw-turn-driver.sh:/app/scripts/openclaw-turn-driver.sh:ro,Z
      - ./soul/SOUL.md:/app/soul/SOUL.md:ro,Z
    networks:
      - openclaw_net

networks:
  openclaw_net:
    driver: bridge
    internal: false
