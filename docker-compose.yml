version: "3.9"

services:
  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - openclaw_net

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - ./cache/ollama:/root/.ollama
    networks:
      - openclaw_net

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    restart: unless-stopped
    environment:
      ASR_MODEL: ${WHISPER_MODEL:-base}
      ASR_ENGINE: openai_whisper
    volumes:
      - ./cache/whisper:/root/.cache
    networks:
      - openclaw_net

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    restart: unless-stopped
    volumes:
      - ./cache/kokoro:/root/.cache
    networks:
      - openclaw_net

  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    restart: unless-stopped
    depends_on:
      - redis
      - ollama
    environment:
      MACHINE_ID: ${MACHINE_ID}
      REDIS_HOST: redis
      OPENCLAW_CONFIG: /app/config/openclaw.json
    volumes:
      - ./skills:/app/skills
      - ./config/openclaw.json:/app/config/openclaw.json:ro
      - ./soul/SOUL.md:/app/soul/SOUL.md:ro
    ports:
      - "18789:18789"
    devices:
      - /dev/snd:/dev/snd
    networks:
      - openclaw_net

networks:
  openclaw_net:
    driver: bridge
    internal: true
